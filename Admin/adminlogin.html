<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Demo Admin Portal | EnWater Design</title>

  <style>
    :root {
      --bg-color: #f0f4f8;
      --card-bg: #f0f4f8;
      --card-shadow: inset -12px -12px 20px rgba(255, 255, 255, 1),
        inset 12px 12px 20px rgba(174, 174, 192, 0.4),
        12px 12px 24px rgba(174, 174, 192, 0.2);
      --icon-bg: #f0f4f8;
      --icon-shadow: inset -6px -6px 10px rgba(255, 255, 255, 1),
        inset 6px 6px 10px rgba(174, 174, 192, 0.4),
        6px 6px 12px rgba(174, 174, 192, 0.3);
      --title-color: #64748b;
      --input-bg: #f0f4f8;
      --input-text: #475569;
      --input-shadow: inset 6px 6px 10px rgba(174, 174, 192, 0.3),
        inset -6px -6px 10px rgba(255, 255, 255, 1);
      --input-focus-shadow: inset 2px 2px 4px rgba(174, 174, 192, 0.4),
        inset -2px -2px 4px rgba(255, 255, 255, 1);
      --button-bg: #117B6F;
      --button-text: #ffffff;
      --button-shadow: 0 8px 25px -5px rgba(17, 123, 111, 0.6),
        -6px -6px 14px rgba(255, 255, 255, 1),
        6px 6px 10px rgba(174, 174, 192, 0.4);
      --button-active-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2),
        inset -2px -2px 6px rgba(255, 255, 255, 0.2),
        0 0 10px rgba(17, 123, 111, 0.4);
      --font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Return button */
    .back-btn {
      position: absolute;
      top: 40px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #64748b;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      color: #1e293b;
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s ease;
    }

    .back-btn:hover svg {
      transform: translateX(-2px);
    }

    /* Login Card Form */
    .login-form {
      width: 100%;
      max-width: 448px;
      /* 28rem */
      padding: 40px;
      border-radius: 48px;
      /* 3rem */
      background-color: var(--card-bg);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      animation: formEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes formEntrance {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Avatar Icon Container */
    .avatar-container {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .avatar-outer {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background-color: var(--icon-bg);
      box-shadow: var(--icon-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-outer img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      mix-blend-multiply: multiply;
    }

    .avatar-placeholder-svg {
      width: 50%;
      height: 50%;
      color: #64748b;
    }

    /* Headers */
    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: var(--title-color);
    }

    .subtitle {
      color: #64748b;
      text-align: center;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Alert Banner Messages */
    .alert-banner {
      padding: 16px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 24px;
      display: none;
    }

    .alert-banner.success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .alert-banner.error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    /* Input elements spacing */
    .input-group-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--title-color);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: var(--input-text);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .input-icon svg {
      width: 16px;
      height: 16px;
    }

    .input-field {
      width: 100%;
      border-radius: 16px;
      padding: 16px 24px 16px 48px;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--input-text);
      background-color: var(--input-bg);
      box-shadow: var(--input-shadow);
      transition: box-shadow 0.25s ease;
    }

    .input-field:focus {
      box-shadow: var(--input-focus-shadow);
    }

    /* Submit Button */
    .submit-button {
      width: 100%;
      margin-top: 16px;
      font-weight: 700;
      padding: 16px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: var(--button-bg);
      color: var(--button-text);
      box-shadow: var(--button-shadow);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .submit-button:hover {
      transform: scale(1.02);
    }

    .submit-button:active {
      transform: scale(0.98);
      box-shadow: var(--button-active-shadow);
    }

    .submit-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: var(--button-shadow);
    }

    /* Loading Spinner */
    .spinner {
      animation: spin 1s linear infinite;
      display: none;
      width: 16px;
      height: 16px;
    }

    .submit-button.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      .back-btn {
        position: relative;
        top: 0;
        left: 0;
        margin-bottom: 24px;
        align-self: flex-start;
      }

      body {
        flex-direction: column;
        justify-content: flex-start;
        padding: 32px 16px;
      }

      .login-form {
        padding: 28px 20px;
        border-radius: 32px;
      }
    }
  </style>
<link rel="icon" type="image/png" href="../assets/images/enwater-design-logo-nav.png" />
</head>

<body>
  <!-- Return button -->
  <a class="back-btn" href="../home.html">
    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      viewBox="0 0 24 24">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Back to Site
  </a>

  <!-- Login Form Card -->
  <form class="login-form" id="loginForm">
    <div class="avatar-container">
      <div class="avatar-outer">
        <!-- Personnel gif icon placeholder. Falls back to static SVG avatar if the gif does not exist -->
        <img alt="Admin avatar" id="avatarImage" src="../assets/personnel.gif"
          onerror="this.style.display='none'; document.getElementById('avatarSvg').style.display='block';" />
        <svg class="avatar-placeholder-svg" fill="none" id="avatarSvg" stroke="currentColor" stroke-linecap="round"
          stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
    </div>

    <h1 class="title">Demo Admin Portal</h1>
    <p class="subtitle">Access demo lead records, subscriptions list, and test CRUD.</p>

    <!-- Success & Error Alert Panels -->
    <div class="alert-banner success" id="successBanner"></div>
    <div class="alert-banner error" id="errorBanner"></div>

    <div class="input-group-container">
      <!-- Email Field -->
      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <input class="input-field" id="email" placeholder="enwaterdesign@gmail.com" required="" type="email" />
        </div>
      </div>

      <!-- Password Field -->
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input class="input-field" id="password" placeholder="••••••••" required="" type="password" />
        </div>
      </div>

      <!-- Submit Button -->
      <button class="submit-button" id="submitBtn" type="submit">
        <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.2)"></circle>
          <path d="M4 12a8 8 0 0 1 8-8" stroke-linecap="round"></path>
        </svg>
        <span id="btnText">Sign In</span>
      </button>
    </div>
  </form>

  <!-- Load Supabase Library CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    (function () {
      'use strict';

      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const successBanner = document.getElementById('successBanner');
      const errorBanner = document.getElementById('errorBanner');

      // Initialize Supabase (loads from environment config or fallback keys if present)
      // Since static site configs vary, we define a safe checker block
      let supabaseClient = null;
      if (window.supabase) {
        // Attempt to check if keys are configured in local config or defaults
        const supabaseUrl = window.SUPABASE_URL || '';
        const supabaseAnonKey = window.SUPABASE_ANON_KEY || '';
        if (supabaseUrl && supabaseAnonKey) {
          supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        }
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Reset feedback banners
        successBanner.style.display = 'none';
        errorBanner.style.display = 'none';

        // Set Loading State
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        btnText.textContent = 'Authenticating...';

        try {
          let authSuccess = false;
          let sessionToken = null;

          if (supabaseClient) {
            const { data, error: authError } = await supabaseClient.auth.signInWithPassword({
              email,
              password,
            });

            if (!authError && data && data.session) {
              authSuccess = true;
              sessionToken = data.session.access_token;
            }
          }

          // Supabase auth succeeded, or we perform local credentials bypass checks
          if (authSuccess) {
            localStorage.setItem('enwater_admin_token', sessionToken);
            successBanner.textContent = 'Authentication successful! Redirecting...';
            successBanner.style.display = 'block';
            setTimeout(() => {
              window.location.href = 'admindashboard.html';
            }, 1000);
          } else {
            // Local bypass fallback credentials validation
            if (email === 'enwaterdesign@gmail.com' && (password === 'EnWater2026!' || password === '12345678')) {
              localStorage.setItem('enwater_admin_token', 'dev_bypass_token');
              successBanner.textContent = 'Demo bypass authentication successful! Redirecting...';
              successBanner.style.display = 'block';
              setTimeout(() => {
                window.location.href = 'admindashboard.html';
              }, 1000);
            } else {
              throw new Error('Authentication failed. Please verify credentials.');
            }
          }
        } catch (err) {
          console.error('Admin authentication failure:', err);
          errorBanner.textContent = err.message || 'Authentication failed. Please verify credentials.';
          errorBanner.style.display = 'block';

          // Re-enable form fields
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          btnText.textContent = 'Sign In';
        }
      });

    })();
  </script>
</body>

</html>
