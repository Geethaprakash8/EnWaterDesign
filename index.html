<style>
:root{--accent:#55a092}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{background:#000;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
    .wrap{position:fixed;inset:0}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
    /* UI only on hover (mobile always visible) */
    .ui{
      position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-between;
      gap:14px;padding:18px;opacity:0;transition:opacity .25s ease;
    }
    .wrap:hover .ui{opacity:1}
    @media (max-width: 768px){.ui{opacity:1}}
    .brand{
      display:inline-flex;align-items:center;gap:10px;color:#fff;text-decoration:none;
      font-weight:800;letter-spacing:.01em;text-shadow:0 2px 18px rgba(0,0,0,.55)
    }
    .dot{width:12px;height:12px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 6px rgba(85,160,146,0.14)}
    .btns{display:flex;gap:10px;align-items:center}
    .btn{
      appearance:none;border:1px solid rgba(255,255,255,0.24);background:rgba(0,0,0,0.18);
      color:#fff;border-radius:999px;padding:10px 14px;font-weight:650;font-size:14px;cursor:pointer;
      backdrop-filter: blur(10px);text-shadow:0 2px 18px rgba(0,0,0,.55)
    }
    .btn:hover{background:rgba(0,0,0,0.28);border-color:rgba(255,255,255,0.28)}
    .btn.primary{border-color:rgba(85,160,146,0.55);background:rgba(85,160,146,0.22)}
    .btn.primary:hover{background:rgba(85,160,146,0.28)}
    /* Autoplay fallback (no dimming overlay over the video; just a centered panel) */
    .fallback{
      position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      display:none;flex-direction:column;gap:14px;align-items:center;justify-content:center;
      padding:18px 18px 16px;border-radius:18px;border:1px solid rgba(255,255,255,0.22);
      background:rgba(0,0,0,0.22);backdrop-filter: blur(10px);
      color:#fff;text-align:center;max-width:min(560px, calc(100vw - 28px));
      z-index: 1002;
    }
    .fallback.show{display:flex}
    .fallback .hint{opacity:.9;line-height:1.35}
    @media (prefers-reduced-motion: reduce){
      video{display:none}
      body{background: linear-gradient(160deg, #0e1726, #0b1220)}
      .fallback{display:flex}
      .ui{opacity:1}
    }

    /* Premium Preloader Styles */
    .preloader {
      position: fixed;
      inset: 0;
      z-index: 100000;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
    }
    .preloader.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .loader-circle-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .progress-ring {
      transform: rotate(-90deg);
      position: absolute;
      inset: 0;
    }
    .progress-ring__circle-bg {
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 2;
    }
    .progress-ring__circle {
      stroke: #55a092;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 389.56;
      stroke-dashoffset: 389.56;
      transition: stroke-dashoffset 0.05s linear;
    }
    .loader-logo {
      position: absolute;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }
    .loader-brand {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .loader-brand .brand-enwater {
      color: #ffffff;
    }
    .loader-brand .brand-design {
      color: #55a092;
    }
    .loader-sub {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 24px;
      font-weight: 600;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .loader-percent {
      font-size: 16px;
      font-weight: 700;
      color: #55a092;
      font-feature-settings: "tnum";
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .ui {
      z-index: 100001; /* Ensure Skip and branding are interactive/visible */
      opacity: 1 !important; /* Keep visible on load */
    }
</style>

<body>
<!-- Preloader Overlay -->
<div id="preloader" class="preloader">
  <div class="preloader-content">
    <div class="loader-circle-wrap">
      <svg class="progress-ring" width="140" height="140">
        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="transparent" r="62" cx="70" cy="70" />
        <circle class="progress-ring__circle" stroke="#55a092" stroke-width="3" fill="transparent" r="62" cx="70" cy="70" />
      </svg>
      <div class="loader-logo">
        <img src="assets/images/enwater-design-logo-transparent-mark.png" alt="EnWater Logo" />
      </div>
    </div>
    <div class="loader-brand">
      <span class="brand-enwater">EnWater</span> <span class="brand-design">Design</span>
    </div>
    <div class="loader-sub">INDEPENDENT SYSTEMS ENGINEERING</div>
    <div id="loader-percent" class="loader-percent">0%</div>
  </div>
</div>

<div class="wrap">
<video autoplay="" id="intro" muted="" playsinline="" poster="assets/media/intro_poster.jpg" preload="auto">
<source src="assets/media/intro.mp4" type="video/mp4"/>
</video>
<div aria-live="polite" class="fallback" id="autoplayFallback">
<div class="hint">
        Your browser blocked autoplay. Tap <strong>Play</strong> to view the intro, or choose <strong>Enter site</strong>.
      </div>
<div class="btns">
<button class="btn primary" id="playBtn" type="button">Play</button>
<a class="btn" href="home.html">Enter site</a>
</div>
</div>
<div class="ui">
<a aria-label="Enter site" class="brand" href="home.html">
<span aria-hidden="true" class="dot"></span>
<span>EnWater Design</span>
</a>
<div class="btns">
<button class="btn" id="skip" type="button">Skip &rarr;</button>
</div>
</div>

<script>
    const video = document.getElementById('intro');
    const skipBtn = document.getElementById('skip');
    const fallback = document.getElementById('autoplayFallback');
    const playBtn = document.getElementById('playBtn');
    const preloader = document.getElementById('preloader');
    const loaderPercent = document.getElementById('loader-percent');
    const progressRingCircle = document.querySelector('.progress-ring__circle');

    const go = () => { window.location.href = 'home.html'; };

    // Redirect when the video ends.
    video.addEventListener('ended', go);

    // Skip button.
    skipBtn.addEventListener('click', () => { try{ video.pause(); }catch(e){} go(); });

    // Progress Ring Calculation
    const r = progressRingCircle.r.baseVal.value;
    const circumference = 2 * Math.PI * r;
    progressRingCircle.style.strokeDasharray = circumference;
    progressRingCircle.style.strokeDashoffset = circumference;

    function setProgress(percent) {
      const offset = circumference - (percent / 100) * circumference;
      progressRingCircle.style.strokeDashoffset = offset;
      loaderPercent.textContent = Math.round(percent) + '%';
    }

    // Simulate loader progress
    let progress = 0;
    const duration = 2500; // 2.5 seconds
    const intervalTime = 16;
    const step = (100 / (duration / intervalTime));

    const progressInterval = setInterval(() => {
      progress += step;
      if (progress >= 100) {
        progress = 100;
        clearInterval(progressInterval);
        setProgress(100);
        setTimeout(() => {
          preloader.classList.add('fade-out');
        }, 300);
      } else {
        setProgress(progress);
      }
    }, intervalTime);

    // Autoplay detection: if it doesn't start playing quickly, show fallback UI.
    let started = false;
    video.addEventListener('playing', () => { started = true; });
    setTimeout(() => {
      if (!started && progress >= 100) fallback.classList.add('show');
    }, 3200);

    // Manual play for fallback.
    playBtn?.addEventListener('click', async () => {
      try {
        await video.play();
        fallback.classList.remove('show');
      } catch (e) {
        // If play fails, user can still click Enter site.
      }
    });
  </script>
<script id="aquad-nav-v25">
/* EnWater Design: stable clickable dropdown nav (no hover-close) */
(function(){
  const nav = document.querySelector('header.site-topnav');
  if(!nav) return;

  const items = Array.from(nav.querySelectorAll('li')).filter(li => li.querySelector('.drop') && li.querySelector('.nav-toggle'));
  if(!items.length) return;

  function hide(li){
    li.classList.remove('open');
    const btn = li.querySelector('.nav-toggle');
    const drop = li.querySelector('.drop');
    if(btn) btn.setAttribute('aria-expanded','false');
    if(drop) drop.style.display = 'none';
  }

  function closeAll(except){
    items.forEach(li => { if(li !== except) hide(li); });
  }

  function position(li){
    const anchor = li.querySelector('.nav-toggle') || li.querySelector('.rootlink') || li;
    const drop = li.querySelector('.drop');
    if(!drop) return;

    // show for measurement
    li.classList.add('open');
    drop.style.display = 'block';
    drop.style.position = 'fixed';
    drop.style.zIndex = '10000';

    const rect = anchor.getBoundingClientRect();
    const dropRect = drop.getBoundingClientRect();
    const pad = 10;

    let left = rect.left;
    if(left + dropRect.width > window.innerWidth - pad){
      left = window.innerWidth - pad - dropRect.width;
    }
    if(left < pad) left = pad;

    let top = rect.bottom + 10;
    if(top + dropRect.height > window.innerHeight - pad){
      const alt = rect.top - dropRect.height - 10;
      if(alt > pad) top = alt;
    }

    drop.style.left = left + 'px';
    drop.style.top  = top + 'px';
  }

  function open(li){
    closeAll(li);
    li.classList.add('open');
    const btn = li.querySelector('.nav-toggle');
    const drop = li.querySelector('.drop');
    if(btn) btn.setAttribute('aria-expanded','true');
    if(drop) drop.style.display = 'block';
    position(li);
  }

  function toggle(li){
    if(li.classList.contains('open')) hide(li);
    else open(li);
  }

  items.forEach(li => {
    const btn  = li.querySelector('.nav-toggle');
    const drop = li.querySelector('.drop');
    if(!btn) return;

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggle(li);
    });

    btn.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        e.stopPropagation();
        toggle(li);
      }
    });

    if(drop){
      drop.addEventListener('click', (e) => {
        // allow clicking links; just prevent outside-close handler
        e.stopPropagation();
      });
    }
  });

  document.addEventListener('click', () => closeAll(null));
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeAll(null); });

  function reposition(){
    const openLi = items.find(li => li.classList.contains('open'));
    if(openLi) position(openLi);
  }
  window.addEventListener('resize', reposition);
  window.addEventListener('scroll', reposition, true);
})();
</script>
